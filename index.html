<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de inscripción</title>
</head>

<body>

    <h1>Formulario de inscripción al taller de desarrollo web</h1>

    <form action="#" method="post">

        <!-- Sección 1 -->
        <fieldset>
            <legend>Datos personales</legend>

            <label for="nombre">Nombres y apellidos:</label>
            <input type="text" id="nombre" name="nombre"
                required minlength="3" maxlength="80"
                placeholder="Ingrese sus nombres y apellidos">
            <br><br>

            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo"
                required placeholder="ejemplo@correo.com">
            <br><br>

            <label for="telefono">Número de teléfono:</label>
            <input type="tel" id="telefono" name="telefono"
                placeholder="0999999999"
                pattern="[0-9]{10}" required>
            <br><br>

            <label for="edad">Edad:</label>
            <input type="number" id="edad" name="edad"
                min="15" max="80" step="1" required>
            <br><br>

            <label for="fecha_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nacimiento"
                name="fecha_nacimiento" required>

        </fieldset>

        <br>

        <!-- Sección 2 -->
        <fieldset>
            <legend>Datos académicos</legend>

            <label for="carrera">Carrera o curso:</label>
            <input type="text" id="carrera" name="carrera"
                required placeholder="Ingrese su carrera">
            <br><br>

            <label for="nivel">Nivel académico:</label>
            <select id="nivel" name="nivel" required>
                <option value="">Seleccione una opción</option>
                <option value="bachillerato">Bachillerato</option>
                <option value="tecnologico">Tecnológico</option>
                <option value="universitario">Universitario</option>
            </select>
            <br><br>

            <label for="institucion">Institución educativa:</label>
            <input type="text" id="institucion"
                name="institucion"
                placeholder="Nombre de la institución"
                required>
        </fieldset>

        <br>

        <!-- Sección 3 -->
        <fieldset>
            <legend>Preferencias del taller</legend>

            <p>Modalidad del taller:</p>

            <input type="radio" id="presencial"
                name="modalidad"
                value="presencial" required>
            <label for="presencial">Presencial</label>

            <input type="radio" id="virtual"
                name="modalidad"
                value="virtual">
            <label for="virtual">Virtual</label>

            <input type="radio" id="hibrida"
                name="modalidad"
                value="hibrida">
            <label for="hibrida">Híbrida</label>

            <br><br>

            <p>Temas de interés:</p>

            <input type="checkbox" id="html"
                name="temas" value="html">
            <label for="html">HTML</label>

            <input type="checkbox" id="css"
                name="temas" value="css">
            <label for="css">CSS</label>

            <input type="checkbox" id="javascript"
                name="temas" value="javascript">
            <label for="javascript">JavaScript</label>

            <br><br>

            <label for="conocimiento">
                Nivel de conocimiento previo:
            </label>

            <select id="conocimiento"
                name="conocimiento" required>
                <option value="">
                    Seleccione una opción
                </option>
                <option value="basico">Básico</option>
                <option value="intermedio">
                    Intermedio
                </option>
                <option value="avanzado">
                    Avanzado
                </option>
            </select>

            <br><br>

            <label for="color">
                Color favorito:
            </label>
            <input type="color"
                id="color"
                name="color">

            <br><br>

            <label for="motivacion">
                Nivel de motivación:
            </label>
            <input type="range"
                id="motivacion"
                name="motivacion"
                min="1"
                max="10"
                step="1">

        </fieldset>

        <br>

        <!-- Sección 4 -->
        <fieldset>
            <legend>Disponibilidad</legend>

            <label for="fecha_inicio">
                Fecha preferida para iniciar:
            </label>
            <input type="date"
                id="fecha_inicio"
                name="fecha_inicio"
                required>

            <br><br>

            <label for="hora">
                Hora disponible:
            </label>
            <input type="time"
                id="hora"
                name="hora"
                required>

            <br><br>

            <label for="jornada">
                Jornada preferida:
            </label>

            <select id="jornada"
                name="jornada" required>

                <option value="">
                    Seleccione
                </option>
                <option value="manana">
                    Mañana
                </option>
                <option value="tarde">
                    Tarde
                </option>
                <option value="noche">
                    Noche
                </option>

            </select>

        </fieldset>

        <br>

        <!-- Sección 5 -->
        <fieldset>
            <legend>Información adicional</legend>

            <label for="archivo">
                Subir archivo de ejemplo:
            </label>
            <input type="file"
                id="archivo"
                name="archivo">

            <br><br>

            <label for="portafolio">
                Portafolio o perfil académico:
            </label>
            <input type="url"
                id="portafolio"
                name="portafolio"
                placeholder="https://ejemplo.com">

            <br><br>

            <label for="comentarios">
                Comentarios adicionales:
            </label>

            <br>

            <textarea
                id="comentarios"
                name="comentarios"
                rows="5"
                cols="50"
                minlength="5"
                maxlength="300"
                placeholder="Escriba un comentario">
            </textarea>

        </fieldset>

        <br>

        <button type="submit">
            Enviar inscripción
        </button>

        <button type="reset">
            Limpiar formulario
        </button>

    </form>

</body>

</html>
